# =============================================
# Machrio Admin API Configuration
# =============================================
# 注意：生产环境配置请使用环境变量覆盖以下设置
# Railway 环境变量会自动注入
# =============================================

spring:
  application:
    name: machrio-admin-api
  
  # 默认激活 local profile（本地开发）
  # 线上环境通过环境变量 SPRING_PROFILES_ACTIVE 覆盖
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # Database Configuration
  # Railway 的 DATABASE_URL 格式：postgresql://user:password@host:port/database
  # Spring Boot 会自动识别 DATABASE_URL 环境变量
  # 敏感信息（密码）已移至 application-local.yml
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000
      initialization-fail-timeout: -1

  # JPA Configuration
  # 首次部署时禁用 DDL 验证，避免启动失败
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# Application Configuration
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4173}
  storage:
    blob-endpoint: ${APP_STORAGE_BLOB_ENDPOINT:https://blob.vercel-blob.com}

# OSS Configuration (阿里云对象存储)
# 敏感信息（密钥）已移至 application-local.yml
oss:
  endpoint: ${OSS_ENDPOINT:}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  bucket: ${OSS_BUCKET:}

# Logging
logging:
  level:
    com.machrio.admin: ${LOG_LEVEL_APP:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_HIBERNATE_SQL:WARN}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_LEVEL_HIBERNATE_BINDER:WARN}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
