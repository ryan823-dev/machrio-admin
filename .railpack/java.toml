# Force Railpack to use Java builder

[build]
# Build commands
commands = [
  "cd backend/machrio-api && chmod +x gradlew",
  "cd backend/machrio-api && ./gradlew build -x test --no-daemon"
]

# Set Java version
java_version = "21"

[start]
# Start Spring Boot
command = "cd backend/machrio-api && java -Xms256m -Xmx512m -XX:+UseG1GC -jar build/libs/*.jar"

# Port
port = "8080"

# Health check
healthcheck_path = "/actuator/health"
healthcheck_timeout = 600
