# Nixpacks Configuration for Java/Spring Boot
# This tells Railway how to build and deploy the Java project

[phases.build]
# Make gradlew executable and build
cmds = [
  "chmod +x backend/machrio-api/gradlew",
  "cd backend/machrio-api && ./gradlew build -x test"
]

[start]
# Start the Spring Boot application
cmd = "cd backend/machrio-api && java -jar build/libs/*.jar"

# Environment variables
[variables]
SPRING_PROFILES_ACTIVE = "production"
SERVER_PORT = "8080"
JAVA_TOOL_OPTIONS = "-Xms256m -Xmx512m -XX:+UseG1GC"
