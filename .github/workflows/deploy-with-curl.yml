name: Deploy to Railway with API

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Railway Project ID
        id: project
        run: |
          echo "project_id=${{ secrets.RAILWAY_PROJECT_ID }}" >> $GITHUB_OUTPUT

      - name: Trigger Railway Deploy
        run: |
          RESPONSE=$(curl -s -X POST "https://backboard.railway.app/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -d '{
              "query": "mutation DeploymentDeploy($projectId: String!, $environment: String!) { deploymentDeploy(projectId: $projectId, environment: $environment) { id status } }",
              "variables": {
                "projectId": "${{ steps.project.outputs.project_id }}",
                "environment": "production"
              }
            }')
          
          echo "Response: $RESPONSE"
          
          if echo "$RESPONSE" | grep -q "error"; then
            echo "Deployment failed"
            exit 1
          fi
          
          echo "Deployment triggered successfully"

      - name: Wait for deployment
        run: sleep 120

      - name: Check deployment status
        run: |
          STATUS=$(curl -s -X POST "https://backboard.railway.app/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -d '{
              "query": "query Deployment($deploymentId: String!) { deployment(id: $deploymentId) { id status } }",
              "variables": {
                "deploymentId": "latest"
              }
            }')
          
          echo "Status: $STATUS"
