name: Setup Railway Database

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Login to Railway
        run: railway login --browserless
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Add PostgreSQL
        run: railway add postgresql
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Set Environment Variables
        run: |
          railway variables set SERVER_PORT=8080
          railway variables set APP_CORS_ALLOWED_ORIGINS=https://*.railway.app
          railway variables set APP_STORAGE_BLOB_ENDPOINT=https://blob.vercel-blob.com
          railway variables set APP_JWT_SECRET=github-actions-jwt-secret-${{ github.run_id }}
          railway variables set APP_JWT_EXPIRATION_MS=86400000
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Trigger Redeploy
        run: railway up
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
