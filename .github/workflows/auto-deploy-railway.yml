name: Auto Deploy to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'Dockerfile'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Railway CLI
        uses: railway/setup-railway@v1
        with:
          version: latest

      - name: Login to Railway
        run: railway login --browserless
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Link to Railway project
        run: railway link --project ${{ secrets.RAILWAY_PROJECT_ID }} --environment production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Set environment variables
        run: |
          railway variables set SERVER_PORT=8080
          railway variables set APP_CORS_ALLOWED_ORIGINS="*"
          railway variables set LOGGING_LEVEL_ROOT=INFO
          railway variables set LOGGING_LEVEL_COM_MACHRIO=DEBUG
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for deployment
        run: sleep 60

      - name: Check deployment status
        run: railway status
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: View deployment logs
        run: railway logs
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
