# =============================================
# Railway Configuration - Dockerfile Deploy
# =============================================
# 用于后端 Java 服务部署
# =============================================

[build]
# 指定使用 Dockerfile 构建
builder = "DOCKERFILE"
# Dockerfile 路径（相对于项目根目录）
dockerfilePath = "backend/machrio-api/Dockerfile"

[deploy]
# 健康检查路径
healthcheckPath = "/actuator/health"
healthcheckTimeout = 600
# 重启策略
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3